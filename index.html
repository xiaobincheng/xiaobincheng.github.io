<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>酒店房态</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;padding:6px 6px 60px}
.h{background:#fff;padding:10px 14px;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.h h1{font-size:17px;font-weight:600}
.h .t{font-size:11px;color:#999}
.s{display:flex;gap:4px;margin-bottom:6px}
.s>div{flex:1;text-align:center;padding:8px 2px;border-radius:8px;color:#fff;font-size:10px}
.s .n{font-size:22px;font-weight:700;line-height:1.1}
.s .l{opacity:.8;font-size:9px}
.s0{background:#667eea}.s1{background:#43e97b}.s2{background:#f5576c}.s3{background:#8c8c8c}.s4{background:#4facfe}.s5{background:#eb2f96}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:4px}
.c{border-radius:6px;padding:6px 4px;text-align:center;font-size:10px;color:#fff}
.c .no{font-size:14px;font-weight:700;line-height:1.3}
.c .tp{font-size:8px;opacity:.8;margin:1px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.e0{background:#52c41a}.e1{background:#f5222d}.e2{background:#8c8c8c}.e3{background:#1890ff}.e4{background:#eb2f96}
.btns{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:8px 14px;display:flex;gap:8px;box-shadow:0 -1px 3px rgba(0,0,0,.05)}
.btns button{flex:1;padding:8px;border:none;border-radius:6px;font-size:13px;font-weight:500}
.b1{background:#1890ff;color:#fff}.b2{background:#f0f0f0;color:#333}
.load{text-align:center;padding:60px 20px;color:#999}
.err{text-align:center;padding:60px 20px;color:#f5222d}
</style>
</head>
<body>
<div class="h"><h1>房态</h1><div class="t" id="tm"></div></div>
<div class="s">
<div class="s0"><div class="n" id="n0">-</div><div class="l">总房</div></div>
<div class="s1"><div class="n" id="n1">-</div><div class="l">空净</div></div>
<div class="s2"><div class="n" id="n2">-</div><div class="l">在住</div></div>
<div class="s3"><div class="n" id="n3">-</div><div class="l">脏房</div></div>
<div class="s4"><div class="n" id="n4">-</div><div class="l">预订</div></div>
<div class="s5"><div class="n" id="n5">-</div><div class="l">维修</div></div>
</div>
<div id="g" class="g"><div class="load">加载中...</div></div>
<div class="btns">
<button class="b1" onclick="load()">刷新</button>
<button class="b2" onclick="location.reload()">重载</button>
</div>
<script>
const URL='https://jsonblob.com/api/jsonBlob/019ed9e8-d4be-7da2-b6fe-ff333b294aaf';
async function load(){
document.getElementById('tm').textContent='加载中...';
try{
const r=await fetch(URL);
if(!r.ok)throw new Error(r.status);
const d=await r.json();
render(d.rooms||[],d.time||'');
}catch(e){
document.getElementById('g').innerHTML='<div class="err">加载失败<br>'+e.message+'<br><br><button class="b1" onclick="load()" style="padding:8px 20px">重试</button></div>';
}
}
function render(rs,tm){
document.getElementById('tm').textContent=tm||'';
let a=0,b=0,c=0,d=0;
rs.forEach(r=>{const s=r.status||'';if(s==='空净')a++;else if(s==='在住')b++;else if(s==='脏房')c++;else if(s==='预订')d++;});
document.getElementById('n0').textContent=rs.length;
document.getElementById('n1').textContent=a;
document.getElementById('n2').textContent=b;
document.getElementById('n3').textContent=c;
document.getElementById('n4').textContent=d;
document.getElementById('g').innerHTML=rs.map(r=>{
const s=r.status||'?';let ec='',tc='',tg='';
if(s==='空净'){ec='e0';tc='t0';tg='空净'}else if(s==='在住'){ec='e1';tc='t1';tg='在住'}else if(s==='脏房'){ec='e2';tc='t2';tg='脏房'}else{ec='e3';tc='t3';tg='预订'}
return'<div class="c '+ec+'"><div class="no">'+r.no+'</div><div class="tp">'+r.type+'</div><div class="tg '+tc+'">'+tg+'</div></div>';
}).join('');
}
load();
</script>
</body>
</html>
